packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"
# Native deps allowed to run install/build scripts (pnpm 11 replaced
# onlyBuiltDependencies with allowBuilds). sharp = Next.js image optimization.
# msgpackr-extract (transitive via uploadthing) is an *optional* native
# accelerator for msgpackr; left off — msgpackr falls back to pure JS, so we
# don't compile it. Explicit `false` records the decision (pnpm re-prompts if
# the key is removed).
#
# @sentry/cli (via @sentry/nextjs → @sentry/bundler-plugin-core) postinstalls a
# native sentry-cli binary used ONLY for source-map *upload* during `next build`,
# which is gated on SENTRY_AUTH_TOKEN (+org/project) — creds the boilerplate
# default doesn't ship. Left off so installs stay network-light and the no-creds
# build is unaffected; flip to true when wiring real source-map upload in CI.
# core-js (transitive via posthog-js) postinstall only prints a funding banner —
# pure-JS polyfill, no build artifact — so skip it.
#
# @swc/core + @parcel/watcher (transitive via next-intl) back its OPTIONAL
# build-time features — the experimental SWC plugin and message-file watching for
# typed-message generation — which this app doesn't enable. Both also ship prebuilt
# platform binaries (their build script only compiles from source as a fallback),
# so `false` keeps installs cross-platform (no node-gyp on Windows) and network-light
# without affecting our setup.
allowBuilds:
  '@parcel/watcher': false
  '@sentry/cli': false
  '@swc/core': false
  core-js: false
  esbuild: true
  msgpackr-extract: false
  sharp: true
# Pin vite (pulled transitively by vitest) to an aged release. vitest@4's dep
# range is vite ^6||^7||^8, which otherwise resolves to the newest 8.x — and the
# current 8.1.0 was published hours ago. We never import vite directly (we use
# vitest/config), so an override is the right tool: it keeps the test runner off
# brand-new releases per the no-fresh-deps policy. Bump as newer 8.x ages out.
overrides:
  vite: 8.0.16
  # ——— Dependabot remediation (2026-07-15): 3 transitive-only alerts with NO upstream
  # fix available (uploadthing@7.7.4 exact-pins effect 3.17.7 · next@16.2.10 pins
  # postcss 8.4.31 · drizzle-kit@0.31.10 still deps the deprecated @esbuild-kit).
  # TEMPORARY — each override's removal condition is tracked in
  # docs/MAINTENANCE.md → Watch items.
  #
  # effect <3.20.0 (GHSA-38f7-945m-qr2g, HIGH — AsyncLocalStorage context loss under
  # concurrent RPC load). 3.21.4 is in-range for @effect/platform@0.90.3's peer
  # (^3.17.7) and clears the 7-day age gate (published 2026-06-18). Expect harmless
  # peer warnings from uploadthing's exact 3.17.7 pins. Remove when uploadthing
  # ships on effect >=3.20.
  effect: 3.21.4
  # postcss <8.5.10 (GHSA-qx2v-qp2m-jg93 — XSS via unescaped </style> in stringify),
  # via next's own exact pin. 8.5.15 was already in the lockfile (tailwind/vite
  # chains) — this dedupes onto it; the ranged key leaves already-safe copies alone.
  # Remove when next's pin reaches >=8.5.10.
  "postcss@<8.5.10": 8.5.15
  # esbuild <=0.24.2 (GHSA-67mh-4wv8-2f99 — dev server lets any site read responses),
  # via drizzle-kit → @esbuild-kit/core-utils (deprecated upstream, frozen on 0.18.x).
  # Child-scoped so the healthy 0.25.12/0.28.1 copies elsewhere in the tree stay
  # untouched; 0.25.12 was already in the lockfile. Remove when drizzle-kit drops
  # @esbuild-kit.
  "@esbuild-kit/core-utils>esbuild": 0.25.12
# Supply-chain release-age gate (Step 26 · A11). Every Phase-1/2 dep note describes this
# discipline ("let a release age before taking it; hours-old/days-old releases were
# rejected, pins were chosen to clear the gate"). It is ENFORCED at two layers:
#   - update layer  — Renovate (.github/renovate.json → minimumReleaseAge: "7 days")
#     gates what gets PROPOSED (a bump PR never lands a <7-day release).
#   - install layer — the pnpm setting below gates the EXISTING lockfile: pnpm
#     validates every entry against the gate on install (including `--frozen-lockfile`),
#     so a too-fresh transitive can never enter the tree through a lockfile edit either.
#
# Enabled 2026-07-08 (A11). It was left off while the repo was days old — pnpm checks
# the WHOLE lockfile, and the early deliberate pins (stripe, @sentry/nextjs, posthog-*,
# lucide-react, lint-staged) + their fresh transitives would have failed a frozen
# install. The tree has since aged past the window: a frozen install verified all 1021
# entries clear the gate. `minimumReleaseAge` reads each version's PUBLISH time (not its
# lockfile-add date), so packages added recently but published long ago (e.g. sonner,
# @manypkg/cli) pass. Value is in MINUTES. Security fixes are not exempted here — bypass
# a specific advisory via auditConfig / an override if a fix is ever younger than 7 days.
minimumReleaseAge: 10080 # 7 days
# Audit allowlist (Step 26). `pnpm audit` (and the CI audit job) block on KNOWN
# advisories; a deep TRANSITIVE dep we can't bump directly gets acknowledged here with
# its path + why it's low-risk for this app, so the audit stays green on the accepted
# status quo and goes red the moment a NEW advisory appears. Prune an entry once the
# fix lands in the lockfile (an ignore for an absent advisory is a harmless no-op).
# EMPTY since 2026-07-15: the three long-standing entries (effect · esbuild · postcss)
# are remediated by the Dependabot overrides above, so the audit now guards those
# overrides live. Re-audit with `pnpm audit` (see DEPLOYMENT.md → Supply chain).
auditConfig:
  ignoreGhsas: []
