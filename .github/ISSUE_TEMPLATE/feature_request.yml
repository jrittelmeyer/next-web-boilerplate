name: Feature request
description: Suggest an improvement or addition
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! This is an opinionated starter — proposals that
        keep the "documented decision + graceful degradation" posture are most
        likely to land. Please search existing issues first.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What's missing or painful today? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Include the rough shape (API, config, docs) if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
